<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading...</title>
  <style>
    :root {
      color-scheme: dark;
    }

    body {
      margin: 0;
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #1f2937, #0f172a 60%);
      font-family: "Segoe UI", Arial, sans-serif;
    }

    .card {
      width: 220px;
      height: 220px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(6px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      border: 3px solid #334155;
      border-top-color: #38bdf8;
      animation: spin 1s linear infinite;
    }

    .label {
      color: #cbd5e1;
      font-size: 13px;
      letter-spacing: 0.02em;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div class="card">
    <img src="/app-icon.png" alt="App logo" width="64" height="64" />
    <div class="spinner"></div>
    <div class="label">Starting application...</div>
  </div>
</body>

</html>
